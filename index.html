<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#040c18;color:#e8f0f8;font-family:sans-serif;min-height:100vh;display:flex;justify-content:center;padding:20px 14px 60px}
.c{background:#0b1829;border:1px solid #1a2d45;border-radius:14px;padding:24px 20px;width:100%;max-width:560px;align-self:flex-start;margin-top:10px}
h1{font-size:20px;color:#e8f0f8;margin:6px 0 8px}
h2{font-size:16px;color:#e8f0f8;margin:6px 0 12px;line-height:1.5}
.sub{color:#4a6888;font-size:14px;line-height:1.65;margin:0 0 12px}
.sep{height:1px;background:#1a2d45;margin:0 0 14px}
.badge{display:inline-block;background:#0c1e34;color:#60a5fa;font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px;margin-bottom:10px}
.bar{background:#0f1e30;border-radius:99px;height:3px;margin:6px 0 14px;overflow:hidden}
.fill{height:100%;border-radius:99px;transition:width .4s}
input,textarea{width:100%;background:#060e1c;border:1.5px solid #1a2d45;border-radius:8px;color:#d8e8f8;font-size:15px;font-family:sans-serif;padding:10px 12px;outline:none;display:block;margin-bottom:14px;line-height:1.6}
textarea{resize:vertical;min-height:88px}
.btn{background:#60a5fa;color:#040c18;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:sans-serif;margin-bottom:6px}
.btn2{background:#0b1829;color:#4a6888;border:1px solid #1a2d45;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:sans-serif}
.demo{background:none;color:#2a4060;border:1px solid #1a2d45;border-radius:8px;padding:7px;font-size:12px;cursor:pointer;width:100%;margin-top:4px;font-family:sans-serif}
.row{display:flex;gap:8px;justify-content:space-between;margin-top:4px}
.dots{display:flex;gap:4px;margin-top:12px;justify-content:center}
.dot{width:22px;height:5px;border-radius:3px}
.box{border:1px solid #1a2d45;border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#060e1c}
.bt{font-size:14px;font-weight:700;margin:0 0 7px}
.rl{color:#6a8aaa;font-size:14px;line-height:1.7;margin:2px 0;padding-left:8px;border-left:2px solid rgba(255,255,255,.07)}
.bl{background:#07101d;border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid #1a2a3a}
.blt{font-weight:700;font-size:14px;margin:0 0 3px}
.al{color:#6a8aaa;font-size:14px;line-height:1.7;margin:2px 0;padding-left:10px}
.ql{color:#60a5fa;font-style:italic;font-size:13px;margin:5px 0 2px}
.il{color:#253850;font-size:12px;margin:1px 0}
.mt{font-style:italic;color:#8aaaca;font-size:14px;line-height:1.8}
.spin{width:28px;height:28px;border:3px solid #1a2d45;border-top-color:#60a5fa;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>

var SM=[
{k:"s",lb:"Specifique",q:"Qu'est-ce que vous voulez precisement accomplir ?"},
{k:"m",lb:"Mesurable",q:"Comment saurez-vous que vous avez reussi ?"},
{k:"a",lb:"Atteignable",q:"Pourquoi cet objectif est-il realisable pour vous ?"},
{k:"r",lb:"Pertinent",q:"Pourquoi est-ce important pour vous maintenant ?"},

];
function x(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function tv(){var t=document.getElementById("ta");return t?t.value.trim():"";}
function sec(c,t,b){return "<div class='box' style='border-left:3px solid "+c+"'><div class='bt' style='color:"+c+"'>"+t+"</div>"+b+"</div>";}
function dots(i){var h="<div class='dots'>";for(var k=0;k<NV.length;k++){var bg=k===i?NV[k].c:k<i?NV[k].c+"77":"#0f1e30";h+="<div class='dot' style='background:"+bg+"'></div>";}return h+"</div>";}
function draw(){
var R=document.getElementById("R");
if(!R)return;
var pg=S.pg;
if(pg==="login"){
R.innerHTML="<div class='c' style='text-align:center;max-width:400px'>"
+"<img src='"+LG+"' style='height:34px;opacity:.85;display:block;margin:0 auto 10px'/>"
+"<h1>Pyramide de Dilts</h1>"
+"<p class='sub'>A4P Mental &mdash; Alexandre Griffet<br>Parcours de coaching pour identifier vos blocages.</p>"

if(el){el.focus();el.onkeydown=function(e){if(e.key==="Enter"){var v=tv();if(v){S.nom=v;S.pg="obj";draw();}}};}
return;
}
if(pg==="obj"){
R.innerHTML="<div class='c' style='max-width:500px'>"
+"<span class='badge'>Etape 1</span>"
+"<h2>Bonjour "+x(S.nom)+" !</h2>"
+"<p class='sub'>Definissons votre objectif principal.</p>"
+"<textarea id='ta' placeholder='Decrivez votre objectif...' style='min-height:110px'>"+x(S.obj)+"</textarea>"
+"<button class='btn' id='b1'>Affiner mon objectif (SMART)</button>"
+"</div>";
document.getElementById("b1").onclick=function(){var v=tv();if(v){S.obj=v;S.pg="smart";S.iS=0;draw();}};
return;
}
if(pg==="smart"){
var q=SM[S.iS];
var p=Math.round(S.iS/SM.length*100);
R.innerHTML="<div class='c' style='max-width:520px'>"
+"<div style='display:flex;justify-content:space-between;margin-bottom:8px'>"
+"<span class='badge'>SMART "+(S.iS+1)+"/"+SM.length+"</span>"
+"<span style='background:#1e3a5f;color:#60a5fa;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px'>"+q.lb+"</span>"
+"</div>"
+"<div class='bar'><div class='fill' style='width:"+p+"%;background:#60a5fa'></div></div>"

+"<button class='btn' style='width:auto' id='nx'>"+(S.iS<SM.length-1?"Suivant":"Commencer")+"</button></div></div>";
document.getElementById("bk").onclick=function(){if(S.iS>0){S.iS--;draw();}else{S.pg="obj";draw();}};
document.getElementById("nx").onclick=function(){var v=tv();if(!v)return;S.sm[SM[S.iS].k]=v;if(S.iS<SM.length-1){S.iS++;draw();}else{S.pg="pyr";S.iN=0;S.iQ=0;draw();}};
return;
}
if(pg==="pyr"){
var n=NV[S.iN];
var tot=0;for(var i=0;i<NV.length;i++)tot+=NV[i].qs.length;
var pas=0;for(var i=0;i<S.iN;i++)pas+=NV[i].qs.length;
var p=Math.round((pas+S.iQ)/tot*100);
var last=(S.iN===NV.length-1&&S.iQ===n.qs.length-1);
var sv=(S.rep[n.id]&&S.rep[n.id][S.iQ])?S.rep[n.id][S.iQ]:"";
R.innerHTML="<div class='c' style='max-width:560px'>"
+"<span class='badge'>"+n.lb+" "+(S.iN+1)+"/"+NV.length+"</span>"
+"<div class='bar'><div class='fill' style='width:"+p+"%;background:"+n.c+"'></div></div>"
+"<h2>"+x(n.qs[S.iQ])+"</h2>"
+"<textarea id='ta' placeholder='Exprimez-vous librement...'>"+x(sv)+"</textarea>"
+"<div class='row'><button class='btn2' id='bk'>Retour</button>"
+"<button class='btn' style='width:auto;background:"+n.c+";color:#040c18' id='nx'>"+(last?"Generer mon diagnostic":"Question suivante")+"</button></div>"
+dots(S.iN)+"</div>";
document.getElementById("bk").onclick=function(){if(S.iQ>0){S.iQ--;draw();}else if(S.iN>0){S.iN--;S.iQ=NV[S.iN].qs.length-1;draw();}};
document.getElementById("nx").onclick=function(){
var v=tv();if(!v)return;
if(!S.rep[n.id])S.rep[n.id]={};
S.rep[n.id][S.iQ]=v;
if(S.iQ+1<n.qs.length){S.iQ++;draw();}
else if(S.iN+1<NV.length){S.iN++;S.iQ=0;draw();}
else{S.pg="load";draw();setTimeout(function(){S.diag=analyse();S.pg="diag";draw();},200);}
};
return;
}
if(pg==="load"){
R.innerHTML="<div class='c' style='max-width:360px;text-align:center'><div style='padding:40px 0'><div class='spin'></div><p class='sub'>Generation du diagnostic...</p></div></div>";
return;
}
if(pg==="diag"&&S.diag){
var d=S.diag;
var sh="<p style='color:#6a8aaa;font-size:14px;margin:3px 0'><b style='color:#c8dff0'>Objectif :</b> "+x(S.obj)+"</p>";
for(var i=0;i<SM.length;i++)if(S.sm[SM[i].k])sh+="<p style='color:#6a8aaa;font-size:14px;margin:2px 0'><b style='color:#c8dff0'>"+SM[i].lb+" :</b> "+x(S.sm[SM[i].k])+"</p>";
var rh="";
for(var i=0;i<NV.length;i++){
var n=NV[i],ls=[];
for(var j=0;j<n.qs.length;j++)if(S.rep[n.id]&&S.rep[n.id][j])ls.push(S.rep[n.id][j]);
if(!ls.length)continue;
rh+="<p style='color:"+n.c+";font-weight:700;font-size:13px;margin:6px 0 2px'>"+n.lb+"</p>";
for(var j=0;j<ls.length;j++)rh+="<div class='rl' style='border-color:"+n.c+"33'>"+x(ls[j])+"</div>";
}
var cc=["#f87171","#fb923c","#a78bfa"];
var bh="";
for(var i=0;i<d.bl.length;i++){
var b=d.bl[i],c=cc[i%3];
bh+="<div class='bl' style='border-color:"+c+"33'><div class='blt' style='color:"+c+"'>Blocage "+(i+1)+" : "+x(b.ti)+"</div><div style='color:#2a4a6a;font-size:12px;margin:0 0 5px'>Niveau : "+x(b.nv)+"</div><p style='color:#6a8aaa;font-size:14px;line-height:1.7;margin:0'>"+x(b.de)+"</p></div>";
}
var ph="";
for(var i=0;i<d.bl.length;i++){
var b=d.bl[i];
ph+="<div style='margin-bottom:12px'><p style='color:#4ade80;font-weight:700;font-size:13px;margin:0 0 3px'>"+x(b.ti)+"</p><p class='il'>Intervention : "+x(b.iv)+"</p>";
for(var j=0;j<b.ac.length;j++)ph+="<div class='al'>&rsaquo; "+x(b.ac[j])+"</div>";
ph+="<p class='ql'>"+x(b.qu)+"</p><p class='il'>Indicateur : "+x(b.in)+"</p></div>";
}
var ch="";
for(var i=0;i<d.te.length;i++)ch+="<p style='color:#fb923c55;font-size:14px;margin:3px 0'>"+x(d.te[i])+"</p>";
for(var i=0;i<d.co.length;i++)ch+="<p style='color:#4ade8055;font-size:14px;margin:3px 0'>"+x(d.co[i])+"</p>";
R.innerHTML="<div class='c' style='max-width:680px'>"
+"<div style='display:flex;align-items:center;gap:10px;margin-bottom:4px'>"
+"<img src='"+LG+"' style='height:24px;opacity:.85'/>"
+"<div><h1 style='font-size:18px;margin:0'>Diagnostic &mdash; "+x(S.nom)+"</h1>"
+"<p style='font-size:11px;color:#1a3050;margin:0'>Pyramide de Dilts &middot; A4P Mental &middot; Alexandre Griffet</p></div></div>"
+"<div class='sep'></div>"
+sec("#60a5fa","Objectif et Cadrage SMART",sh)
+sec("#a78bfa","Lecture de votre Pyramide",rh)
+(ch?sec("#fb923c","Coherence de la Pyramide",ch):"")
+sec("#f87171","Blocages identifies",bh)
+sec("#4ade80","Plan d&rsquo;action",ph)
+sec("#34d399","Vos 3 priorites",
"<p style='color:#6a8aaa;font-size:14px;line-height:1.7;margin:3px 0'><b style='color:#c8dff0'>1. Croyances limitantes :</b> Une croyance liberee libere automatiquement les comportements.</p>"
+"<p style='color:#6a8aaa;font-size:14px;line-height:1.7;margin:3px 0'><b style='color:#c8dff0'>2. Identite cible :</b> Definir qui vous devez devenir et l&rsquo;incarner dans vos microdecisions.</p>"
+"<p style='color:#6a8aaa;font-size:14px;line-height:1.7;margin:3px 0'><b style='color:#c8dff0'>3. Rituels d&rsquo;action :</b> Transformer les intentions en comportements reguliers.</p>")
+sec("#fbbf24","Message personnel pour "+x(S.nom),
"<p class='mt'>"+x(S.nom)+", vous avez eu le courage de vous arreter pour vous regarder en face &mdash; c&rsquo;est deja un acte de leader. Ce que vos reponses revelent, c&rsquo;est quelqu&rsquo;un de riche interieurement, avec des valeurs claires, des capacites reelles et un sens profond de sa mission. Ce qui vous retient n&rsquo;est pas un manque de talent &mdash; c&rsquo;est une histoire que vous vous racontez, et les histoires peuvent changer. Vous avez tout ce qu&rsquo;il faut. Il est temps de le decider.</p>")
+"<div style='margin-top:16px'><button class='btn2' id='rb'>Nouveau parcours</button></div></div>";
document.getElementById("rb").onclick=function(){S.pg="login";S.nom="";S.obj="";S.sm={};S.iS=0;S.iN=0;S.iQ=0;S.rep={};S.diag=null;draw();};
return;
}
}
function analyse(){
function txt(id){var n=NV.filter(function(v){return v.id===id;})[0];var s="";for(var i=0;i<n.qs.length;i++)s+=(S.rep[id]&&S.rep[id][i]?S.rep[id][i]:" ");return s.toLowerCase();}
function has(t,ws){for(var i=0;i<ws.length;i++)if(t.indexOf(ws[i])>=0)return true;return false;}
var cT=txt("croy"),coT=txt("comp"),iT=txt("id"),caT=txt("cap"),sT=txt("sens");
var bl=[];
if(has(cT,["pas legitime","pas capable","pas assez","ne merite","peur","doute"])){
bl.push({ti:"Croyance limitante d illegitimite",nv:"Croyances et Valeurs",de:"Vos reponses revelent une croyance profonde que vous n etes pas tout a fait a votre place. Ce filtre invisible sabote vos comportements et freine vos capacites.",iv:"Croyances et Valeurs vers Identite",ac:["Listez 10 preuves concretes de vos reussites passees. Relisez-les chaque matin pendant 21 jours.","Identifiez l origine de cette croyance et dissociez ce message de votre valeur reelle."],qu:"Si vous saviez que vous meritez ce que vous visez, quelle serait votre premiere action des demain ?",in:"Vous formulez vos demandes sans vous excuser de les faire."});}
if(has(coT,["procrastin","reporte","evite","sans agir","efface"])){
bl.push({ti:"Comportements de sabotage",nv:"Comportement",de:"Ces comportements sont des protections inconscientes contre une peur. Ils maintiennent un statu quo rassurant mais bloquent toute progression.",iv:"Capacites vers Croyances",ac:["Definissez UNE action de 15 minutes a faire dans les 24h. Non negociable.","Tenez un journal : qu ai-je evite aujourd hui ? Quelle peur se cachait derriere ?"],qu:"Si l echec etait impossible, qu est-ce que vous feriez aujourd hui ?",in:"Vous passez a l action dans les 24h suivant une decision."});}
if(has(iT,["pas leader","discret","efface","invisible","pas confiant","pas affirme"])){
bl.push({ti:"Ecart identitaire",nv:"Identite",de:"Il existe un ecart entre l identite incarnee aujourd hui et celle requise pour atteindre votre objectif. Sans ce changement, vous auto-saboterez tout progres.",iv:"Identite vers Sens",ac:["Redigez le portrait de la personne que vous serez une fois votre objectif atteint. Relisez-le chaque soir.","Adoptez chaque jour un comportement de cette future version de vous, meme micro."],qu:"Qui devez-vous decider d etre des aujourd hui pour que votre objectif devienne inevitable ?",in:"Vous decrivez qui vous etes avec les mots de votre identite cible."});}
if(bl.length===0){
bl.push({ti:"Passage a l action",nv:"Comportement",de:"Le principal enjeu est de passer de la reflexion a l action structuree. Beaucoup de personnes bien alignees restent bloquees faute d un plan concret.",iv:"Comportement",ac:["Definissez 3 actions hebdomadaires non-negociables. Planifiez-les comme des rendez-vous.","Creez un systeme de redevabilite avec un partenaire de progression."],qu:"Quelle est LA chose qui, faite regulierement, changerait tout dans votre progression ?",in:"Vous avancez chaque semaine sur votre objectif."});}
var te=[],co=[];
if(has(sT,["contribuer","aider","service","impact"])&&has(cT,["pas legitime","pas assez","peur"]))te.push("Tension entre Sens (vouloir contribuer) et Croyances (se sentir illegitime).");
if(has(caT,["communication","ecoute","relation"]))co.push("Vos capacites relationnelles et de communication sont un appui solide.");
return{bl:bl,te:te,co:co};
}
function demo(){
S.nom="Alex";S.obj="Devenir delegue medical.";
S.sm={s:"CDI delegue medical.",m:"Contrat signe.",a:"Formation plus experience.",r:"Mes valeurs.",t:"6 mois."};
S.rep={env:{0:"Calme.",1:"Bureau.",2:"Positifs.",3:"Equipe.",4:"Negatifs.",5:"Matin."},comp:{0:"Je procrastin.",1:"Je m efface.",2:"Apprendre.",3:"Devrais sans agir.",4:"Croises.",5:"Bloque."},cap:{0:"Communication.",1:"J explique bien.",2:"Persuasion.",3:"Confiance."},croy:{0:"Famille.",1:"Pas legitime.",2:"Pas fait pour ca.",3:"Honnetete.",4:"Elle merite."},id:{0:"Curieux.",1:"Fiable pas leader.",2:"Discret.",3:"Pas toujours.",4:"Expert."},sens:{0:"Sante.",1:"Pratiques.",2:"Ecoute.",3:"Aide."}};
S.diag=analyse();S.pg="diag";draw();
}
draw();
</script>
