<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>A4P Mental — Pyramide de Dilts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#040c18;color:#e8f0f8;min-height:100vh}
#app{min-height:100vh;display:flex;justify-content:center;padding:24px 14px 80px;position:relative}
.glow{position:fixed;top:0;left:0;right:0;height:40vh;background:radial-gradient(ellipse at 50% 0%,#0c1e38 0%,transparent 70%);pointer-events:none;z-index:0}
.card{background:#0a1628;border:1px solid #0f1e30;border-radius:18px;padding:26px 22px;width:100%;max-width:600px;margin-top:18px;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.6);align-self:flex-start}
h1{font-size:20px;font-weight:700;margin:4px 0 8px;color:#e8f0f8}
h2{font-size:17px;font-weight:700;margin:8px 0 10px;color:#e8f0f8;line-height:1.5}
.sub{color:#4a6080;font-size:14px;line-height:1.7;margin:0 0 14px}
.sep{height:1px;background:#0f1e30;margin:0 0 18px}
.bdg{display:inline-block;background:#0c1e34;color:#60a5fa;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.bar{background:#0f1e30;border-radius:99px;height:3px;margin:6px 0 16px;overflow:hidden}
.bar-in{height:100%;border-radius:99px;transition:width .4s}
input,textarea{width:100%;background:#07111f;border:1.5px solid #1e2d3d;border-radius:10px;color:#dde6f0;font-family:inherit;font-size:15px;padding:11px 13px;outline:none;display:block;margin-bottom:18px;line-height:1.6}
textarea{resize:vertical;min-height:100px}
.btn{background:#60a5fa;color:#040c18;border:none;border-radius:8px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-bottom:6px}
.btn2{background:#0a1628;color:#4a6080;border:1px solid #0f1e30;border-radius:8px;padding:11px 15px;font-size:13px;cursor:pointer;font-family:inherit}
.bdemo{background:transparent;color:#2a4060;border:1px solid #0f1e30;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit;width:100%;margin-top:4px}
.row{display:flex;gap:8px;justify-content:space-between;margin-top:4px;flex-wrap:wrap}
.mpyr{display:flex;gap:4px;margin-top:14px;justify-content:center}
.sec{border:1px solid #0f1e30;border-radius:10px;padding:14px 16px;margin-bottom:12px;background:#060e1c}
.sec-t{font-size:14px;font-weight:700;margin:0 0 8px}
.rline{color:#6a8aaa;font-size:14px;line-height:1.8;margin:2px 0;padding-left:8px;border-left:2px solid rgba(255,255,255,.08)}
.blk{background:#080f1c;border-radius:8px;padding:13px 15px;margin-bottom:9px;border:1px solid #1a1a2a}
.blk-t{font-weight:700;font-size:14px;margin:0 0 4px}
.aln{color:#6a8aaa;font-size:14px;line-height:1.8;margin:2px 0;padding-left:12px}
.qln{color:#60a5fa;font-style:italic;font-size:13px;margin:5px 0 2px}
.iln{color:#2a4060;font-size:12px;margin:1px 0}
.msgtxt{font-style:italic;color:#8aaaca;font-size:14px;line-height:1.8}
.logo{display:block;margin:0 auto 10px;height:34px;opacity:.85}
.logo-sm{height:26px;opacity:.85}
.spin{width:30px;height:30px;border:3px solid #0f1e30;border-top-color:#60a5fa;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px 0;color:#4a6080;font-size:14px}
</style>
</head>

function analyse(){
function txt(nid){var n=NIV.filter(function(x){return x.id===nid;})[0];var s=””;for(var i=0;i<n.qs.length;i++)s+=(rep[nid]&&rep[nid][i]?rep[nid][i]:” “);return s.toLowerCase();}
function has(t,ws){for(var i=0;i<ws.length;i++)if(t.indexOf(ws[i])>=0)return true;return false;}
var cT=txt(“croy”),coT=txt(“comp”),iT=txt(“id”),caT=txt(“cap”),sT=txt(“sens”);
var bl=[];
if(has(cT,[“pas légitime”,“pas capable”,“pas fait pour”,“pas assez”,“ne mérite”,“peur”,“doute”,“illégitime”])){
bl.push({ti:“Croyance limitante d’illégitimité”,nv:“Croyances & Valeurs”,
de:“Vos réponses révèlent une croyance profonde que vous n’êtes pas tout à fait à votre place. Ce filtre invisible sabote vos comportements, freine vos capacités, et crée une dissonance entre votre identité vécue et souhaitée.”,
iv:“Croyances & Valeurs → Identité”,
ac:[“Listez 10 preuves concrètes de vos réussites passées. Relisez-les chaque matin pendant 21 jours.”,
“Identifiez l’origine de cette croyance et dissociez ce message de votre valeur réelle.”],
qu:“Si vous saviez que vous méritez pleinement ce que vous visez, quelle serait votre première action dès demain ?”,
in:“Vous formulez vos demandes sans vous excuser de les faire.”});}
if(has(coT,[“procrastin”,“reporte”,“évite”,“sans agir”,“efface”,“m’efface”])){
bl.push({ti:“Comportements de sabotage — procrastination et évitement”,nv:“Comportement”,
de:“Ces comportements sont des protections inconscientes contre une peur. Ils maintiennent un statu quo rassurant mais bloquent toute progression.”,
iv:“Capacités → Croyances”,
ac:[“Définissez UNE action de 15 minutes à faire dans les 24h suivantes. Non négociable.”,
“Tenez un journal : qu’ai-je évité aujourd’hui ? Quelle peur se cachait derrière ?”],
qu:“Si l’échec était impossible, qu’est-ce que vous feriez aujourd’hui sans hésiter ?”,
in:“Vous passez à l’action dans les 24h suivant une décision.”});}
if(has(iT,[“pas leader”,“discret”,“effacé”,“invisible”,“pas confiant”,“pas affirmé”])){
bl.push({ti:“Écart identitaire — qui je suis vs qui je dois devenir”,nv:“Identité”,
de:“Il existe un écart entre l’identité incarnée aujourd’hui et celle requise pour atteindre votre objectif. Sans ce changement identitaire, vous auto-saboterez tout progrès.”,
iv:“Identité → Sens”,
ac:[“Rédigez le portrait de la personne que vous serez une fois votre objectif atteint. Relisez-le chaque soir.”,
“Adoptez chaque jour un comportement de cette future version de vous, même micro.”],
qu:“Qui devez-vous décider d’être dès aujourd’hui pour que votre objectif devienne inévitable ?”,
in:“Vous décrivez spontanément qui vous êtes avec les mots de votre identité cible.”});}
if(bl.length===0){
bl.push({ti:“Passage à l’action — transformer la clarté en résultats”,nv:“Comportement”,
de:“Le principal enjeu est de passer de la réflexion à l’action structurée et régulière. Beaucoup de personnes bien alignées restent bloquées faute d’un plan concret.”,
iv:“Comportement”,
ac:[“Définissez 3 actions hebdomadaires non-négociables. Planifiez-les comme des rendez-vous.”,
“Créez un système de redevabilité avec un partenaire de progression.”],
qu:“Quelle est LA chose qui, faite régulièrement, changerait tout dans votre progression ?”,
in:“Vous avancez chaque semaine sur votre objectif.”});}
var te=[],co=[];
if(has(sT,[“contribuer”,“aider”,“service”,“impact”])&&has(cT,[“pas légitime”,“pas assez”,“peur”]))te.push(“Tension entre Sens (vouloir contribuer) et Croyances (se sentir illégitime). Votre Pourquoi est fort mais vos croyances vous en éloignent.”);
if(has(iT,[“curieux”,“empathique”,“créatif”,“passionné”])&&has(coT,[“procrastin”,“efface”]))te.push(“Tension entre Identité (riche) et Comportement (en retrait). Vous êtes plus que ce que vos comportements laissent voir.”);
if(has(caT,[“communication”,“écoute”,“relation”,“pédagogie”]))co.push(“Vos capacités relationnelles et de communication sont un appui solide.”);
return{bl:bl,te:te,co:co};
}
