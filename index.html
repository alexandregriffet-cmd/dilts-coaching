<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A4P Mental — Pyramide de Dilts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#040c18;color:#e8f0f8;min-height:100vh}
.page{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:24px 14px 80px}
.glow{position:fixed;top:0;left:0;right:0;height:40vh;background:radial-gradient(ellipse at 50% 0%,#0c1e38 0%,transparent 70%);pointer-events:none;z-index:0}
.card{background:#0a1628;border:1px solid #0f1e30;border-radius:18px;padding:28px 26px;width:100%;max-width:600px;margin-top:18px;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.6)}
h1{font-size:20px;font-weight:700;margin:4px 0 8px;color:#e8f0f8}
h2{font-size:18px;font-weight:700;margin:10px 0 8px;color:#e8f0f8}
p.sub{color:#5a7a9a;font-size:14px;line-height:1.7;margin:0 0 14px}
.sep{height:1px;background:#0f1e30;margin:0 0 18px}
.badge{background:#0c1e34;color:#60a5fa;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1px;display:inline-block;margin-bottom:10px}
.bar-bg{background:#0f1e30;border-radius:99px;height:3px;margin:8px 0 16px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
input,textarea{width:100%;background:#07111f;border:1.5px solid #1e2d3d;border-radius:10px;color:#dde6f0;font-family:inherit;font-size:15px;padding:12px 14px;outline:none;display:block;margin-bottom:20px}
textarea{resize:vertical;line-height:1.65;min-height:100px}
.btn-main{background:#60a5fa;color:#040c18;border:none;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-bottom:8px}
.btn-sec{background:#0a1628;color:#4a6080;border:1px solid #0f1e30;border-radius:8px;padding:11px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-demo{background:transparent;color:#3a5070;border:1px solid #0f1e30;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit;width:100%;margin-top:4px}
.btn-niv{border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.row{display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap;margin-top:4px}
.mini-pyr{display:flex;gap:4px;margin-top:16px;justify-content:center}
.sec{border:1px solid #0f1e30;border-radius:10px;padding:16px 18px;margin-bottom:14px;background:#080e1a}
.sec-t{font-size:14px;font-weight:700;margin:0 0 10px}
.rep{color:#7a9ab8;font-size:14px;line-height:1.8;margin:3px 0}
.rep b{color:#c8dff0}
.niv-rep{color:#7a9ab8;font-size:14px;line-height:1.8;margin:2px 0;padding-left:10px}
.bloc{background:#0a0f1a;border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid #1a1a2a}
.bloc-t{font-weight:700;font-size:14px;margin:0 0 4px}
.action{color:#7a9ab8;font-size:14px;line-height:1.8;margin:3px 0;padding-left:14px}
.q-line{color:#60a5fa;font-style:italic;font-size:14px;margin:6px 0 2px}
.ind{color:#3a5070;font-size:12px;margin:2px 0}
.msg{font-style:italic;line-height:1.8;color:#9aafca;font-size:14px}
.logo{display:block;margin:0 auto 10px;height:36px;opacity:.9}
.logo-sm{height:28px;opacity:.9;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:32px;height:32px;border:3px solid #0f1e30;border-top-color:#60a5fa;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.center{text-align:center}
@media print{
  body{background:#fff!important;color:#111!important}
  .no-print{display:none!important}
  .for-print{display:block!important}
  .page{display:none!important}
  .glow{display:none!important}
}
@media screen{.for-print{display:none}}
.pr{font-family:Georgia,serif;color:#111;padding:24px 32px;font-size:13px;line-height:1.6}
.pr-hd{text-align:center;border-bottom:2px solid #111;padding-bottom:14px;margin-bottom:20px}
.pr-h1{font-size:18px;font-weight:bold;margin:6px 0 4px}
.pr-sub{font-size:12px;color:#555}
.pr-bl{font-size:14px;font-weight:bold;padding:5px 10px;background:#f0f0f0;margin:16px 0 8px;border-left:4px solid #333}
.pr-sec{border:1px solid #ccc;border-left:3px solid #777;border-radius:4px;padding:10px 12px;margin-bottom:8px;page-break-inside:avoid}
.pr-t{font-weight:bold;font-size:13px;margin-bottom:4px}
.pr-p{font-size:13px;color:#333;margin:2px 0;line-height:1.6}
.pr-sm{font-size:11px;color:#777;margin:3px 0}
.pr-i{font-style:italic;font-size:13px;color:#444;margin:4px 0}
.pr-msg{background:#fffbe6;border:1px solid #ddd;border-left:4px solid #c8a000;padding:12px;font-style:italic;font-size:13px;line-height:1.7;margin-top:4px}
.pr-ft{text-align:center;color:#aaa;font-size:11px;margin-top:20px;padding-top:10px;border-top:1px solid #eee}
</style>
</head>

var REC = null, REC_ON = false, REC_BASE = "";

function mic(taId, color) {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  var ta = document.getElementById(taId);
  if (!ta) return;
  if (REC_ON && REC) { REC.stop(); return; }
  REC = new SR();
  REC.lang = "fr-FR"; REC.continuous = true; REC.interimResults = true;
  REC_BASE = ta.value || "";
  REC.onstart = function() { REC_ON = true; micUI(color); };
  REC.onend = function() { REC_ON = false; micUI(null); };
  REC.onerror = function() { REC_ON = false; micUI(null); };
  REC.onresult = function(e) {
    var fin = "", tmp = "";
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript + " ";
      else tmp += e.results[i][0].transcript;
    }
    if (fin) REC_BASE = (REC_BASE + " " + fin).trim();
    ta.value = (REC_BASE + (tmp ? " " + tmp : "")).trim();
    S.cur = ta.value;
  };
  try { REC.start(); } catch(e) {}
}

function micUI(c) {
  var b = document.getElementById("micbtn");
  var h = document.getElementById("michint");
  if (!b) return;
  if (c) {
    b.style.background = c; b.style.color = "#040c18";
    b.innerHTML = "&#9632;";
    if (h) h.style.display = "flex";
