<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#040c18;color:#e8f0f8;min-height:100vh;display:flex;justify-content:center;padding:20px}
.card{background:#0a1628;border:1px solid #0f1e30;border-radius:16px;padding:24px 20px;width:100%;max-width:560px;margin-top:16px;align-self:flex-start}
h1{font-size:20px;font-weight:700;margin:0 0 8px}
h2{font-size:16px;font-weight:700;margin:0 0 10px;line-height:1.5}
p{color:#4a6080;font-size:14px;line-height:1.7;margin:0 0 12px}
.sep{height:1px;background:#0f1e30;margin:0 0 16px}
.bdg{display:inline-block;background:#0c1e34;color:#60a5fa;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px}
.bar{background:#0f1e30;border-radius:99px;height:3px;margin:6px 0 14px;overflow:hidden}
.bar-in{height:100%;border-radius:99px;transition:width .4s}
input,textarea{width:100%;background:#07111f;border:1.5px solid #1e2d3d;border-radius:8px;color:#dde6f0;font-family:inherit;font-size:15px;padding:10px 12px;outline:none;display:block;margin-bottom:16px;line-height:1.6}
textarea{resize:vertical;min-height:90px}
.btn{background:#60a5fa;color:#040c18;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:6px}
.btn2{background:#0a1628;color:#4a6080;border:1px solid #0f1e30;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer}
.bdemo{background:transparent;color:#2a4060;border:1px solid #0f1e30;border-radius:8px;padding:7px;font-size:12px;cursor:pointer;width:100%;margin-top:4px}
.row{display:flex;gap:8px;justify-content:space-between;margin-top:4px}
.mpyr{display:flex;gap:4px;margin-top:12px;justify-content:center}
.seg{width:22px;height:5px;border-radius:3px}
.sec{border:1px solid #0f1e30;border-radius:8px;padding:14px 15px;margin-bottom:12px;background:#060e1c}
.sec-t{font-size:14px;font-weight:700;margin:0 0 8px}
.rline{color:#6a8aaa;font-size:14px;line-height:1.7;margin:2px 0;padding-left:8px;border-left:2px solid rgba(255,255,255,.08)}
.blk{background:#080f1c;border-radius:8px;padding:12px 14px;margin-bottom:8px;border:1px solid #1a1a2a}
.blk-t{font-weight:700;font-size:14px;margin:0 0 4px}
.aln{color:#6a8aaa;font-size:14px;line-height:1.7;margin:2px 0;padding-left:10px}
.qln{color:#60a5fa;font-style:italic;font-size:13px;margin:5px 0 2px}
.iln{color:#2a4060;font-size:12px;margin:1px 0}
.msgtxt{font-style:italic;color:#8aaaca;font-size:14px;line-height:1.8}
.spin{width:28px;height:28px;border:3px solid #0f1e30;border-top-color:#60a5fa;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>

function analyse(){
function txt(nid){var n=NIV.filter(function(x){return x.id===nid;})[0];var s=””;for(var i=0;i<n.qs.length;i++)s+=(rep[nid]&&rep[nid][i]?rep[nid][i]:” “);return s.toLowerCase();}
function has(t,ws){for(var i=0;i<ws.length;i++)if(t.indexOf(ws[i])>=0)return true;return false;}
var cT=txt(“croy”),coT=txt(“comp”),iT=txt(“id”),caT=txt(“cap”),sT=txt(“sens”);
var bl=[];
if(has(cT,[“pas legitime”,“pas capable”,“pas assez”,“ne merite”,“peur”,“doute”])){
bl.push({ti:“Croyance limitante d illegitimite”,nv:“Croyances et Valeurs”,de:“Vos reponses revelent une croyance profonde que vous n etes pas tout a fait a votre place. Ce filtre invisible sabote vos comportements et freine vos capacites.”,iv:“Croyances et Valeurs vers Identite”,ac:[“Listez 10 preuves concretes de vos reussites passees. Relisez-les chaque matin pendant 21 jours.”,“Identifiez l origine de cette croyance et dissociez ce message de votre valeur reelle.”],qu:“Si vous saviez que vous meritez ce que vous visez, quelle serait votre premiere action des demain ?”,in:“Vous formulez vos demandes sans vous excuser de les faire.”});}
if(has(coT,[“procrastin”,“reporte”,“evite”,“sans agir”,“efface”])){
bl.push({ti:“Comportements de sabotage”,nv:“Comportement”,de:“Ces comportements sont des protections inconscientes contre une peur. Ils maintiennent un statu quo rassurant mais bloquent toute progression.”,iv:“Capacites vers Croyances”,ac:[“Definissez UNE action de 15 minutes a faire dans les 24h suivantes. Non negociable.”,“Tenez un journal : qu ai-je evite aujourd hui ? Quelle peur se cachait derriere ?”],qu:“Si l echec etait impossible, qu est-ce que vous feriez aujourd hui sans hesiter ?”,in:“Vous passez a l action dans les 24h suivant une decision.”});}
if(has(iT,[“pas leader”,“discret”,“efface”,“invisible”,“pas confiant”,“pas affirme”])){
bl.push({ti:“Ecart identitaire”,nv:“Identite”,de:“Il existe un ecart entre l identite incarnee aujourd hui et celle requise pour atteindre votre objectif. Sans ce changement, vous auto-saboterez tout progres.”,iv:“Identite vers Sens”,ac:[“Redigez le portrait de la personne que vous serez une fois votre objectif atteint. Relisez-le chaque soir.”,“Adoptez chaque jour un comportement de cette future version de vous, meme micro.”],qu:“Qui devez-vous decider d etre des aujourd hui pour que votre objectif devienne inevitable ?”,in:“Vous decrivez spontanement qui vous etes avec les mots de votre identite cible.”});}
if(bl.length===0){bl.push({ti:“Passage a l action”,nv:“Comportement”,de:“Le principal enjeu est de passer de la reflexion a l action structuree. Beaucoup de personnes bien alignees restent bloquees faute d un plan concret.”,iv:“Comportement”,ac:[“Definissez 3 actions hebdomadaires non-negociables. Planifiez-les comme des rendez-vous.”,“Creez un systeme de redevabilite avec un partenaire de progression.”],qu:“Quelle est LA chose qui, faite regulierement, changerait tout dans votre progression ?”,in:“Vous avancez chaque semaine sur votre objectif.”});}
var te=[],co=[];
if(has(sT,[“contribuer”,“aider”,“service”,“impact”])&&has(cT,[“pas legitime”,“pas assez”,“peur”]))te.push(“Tension entre Sens (vouloir contribuer) et Croyances (se sentir illegitime). Votre Pourquoi est fort mais vos croyances vous en eloignent.”);
if(has(caT,[“communication”,“ecoute”,“relation”]))co.push(“Vos capacites relationnelles et de communication sont un appui solide.”);
return{bl:bl,te:te,co:co};
}
