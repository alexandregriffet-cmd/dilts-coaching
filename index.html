<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A4P Mental — Pyramide de Dilts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#040c18;color:#e8f0f8;min-height:100vh}
.page{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:24px 14px 80px;position:relative}
.glow{position:fixed;top:0;left:0;right:0;height:40vh;background:radial-gradient(ellipse at 50% 0%,#0c1e38 0%,transparent 70%);pointer-events:none;z-index:0}
.card{background:#0a1628;border:1px solid #0f1e30;border-radius:18px;padding:28px 26px;width:100%;max-width:600px;margin-top:18px;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.card.centre{text-align:center}
h1{font-size:20px;font-weight:700;margin:4px 0 6px;color:#e8f0f8}
h2{font-size:18px;font-weight:700;margin:10px 0 8px;color:#e8f0f8}
p{color:#5a7a9a;font-size:14px;line-height:1.7;margin:0 0 14px}
.sep{height:1px;background:#0f1e30;margin:0 0 18px}
.badge{background:#0c1e34;color:#60a5fa;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;display:inline-block;margin-bottom:10px}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block}
.bar-bg{background:#0f1e30;border-radius:99px;height:3px;margin:8px 0 16px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
input,textarea{width:100%;background:#07111f;border:1.5px solid #1e2d3d;border-radius:10px;color:#dde6f0;font-family:inherit;font-size:15px;padding:12px 14px;outline:none;display:block;margin-bottom:20px}
textarea{resize:vertical;line-height:1.65}
.input-wrap{position:relative}
.input-wrap textarea{padding-right:48px}
.mic-btn{position:absolute;right:8px;bottom:8px;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#1a2a3a;color:#4a6080}
.mic-hint{position:absolute;bottom:-20px;right:0;font-size:11px;display:flex;align-items:center;gap:4px}
.mic-dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.btn{background:#60a5fa;color:#040c18;border:none;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}
.btn.auto{width:auto}
.btn-sec{background:#0a1628;color:#4a6080;border:1px solid #0f1e30;border-radius:8px;padding:11px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-demo{background:#0a1628;color:#4a6080;border:1px solid #0f1e30;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit;width:100%;margin-top:8px;opacity:.5}
.row{display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap}
.mini-pyr{display:flex;gap:4px;margin-top:16px;justify-content:center}
.mini-seg{height:5px;border-radius:3px;transition:all .3s;width:26px}
.sec-box{border:1px solid #0f1e30;border-radius:10px;padding:16px 18px;margin-bottom:14px;background:#080e1a}
.sec-title{font-size:14px;font-weight:700;margin:0 0 10px}
.rep-line{color:#7a9ab8;font-size:14px;line-height:1.8;margin:4px 0}
.niv-line{color:#7a9ab8;font-size:14px;line-height:1.8;margin:2px 0;padding-left:10px;border-left:2px solid rgba(255,255,255,.1)}
.bloc-card{background:#0a0f1a;border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.bloc-title{font-weight:700;font-size:14px;margin:0 0 4px}
.action-line{color:#7a9ab8;font-size:14px;line-height:1.8;margin:3px 0;display:flex;gap:6px}
.question-line{color:#60a5fa;font-style:italic;font-size:14px;margin:6px 0 2px}
.indicateur{color:#3a5070;font-size:12px;margin:2px 0}
.msg-box{font-style:italic;line-height:1.8;color:#9aafca;font-size:14px}
.logo-img{height:36px;opacity:.9;display:block;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid #0f1e30;border-top-color:#60a5fa;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@media print{
  body{background:white!important;color:#111!important}
  .no-print{display:none!important}
  .print-doc{display:block!important}
  .page{display:none!important}
}
@media screen{.print-doc{display:none}}
.print-doc{font-family:Georgia,serif;color:#111;background:white;padding:24px 32px;font-size:13px;line-height:1.6}
.pd-header{text-align:center;border-bottom:2px solid #111;padding-bottom:14px;margin-bottom:20px}
.pd-h1{font-size:18px;font-weight:bold;margin-bottom:4px}
.pd-sub{font-size:12px;color:#555}
.pd-bloc{font-size:14px;font-weight:bold;padding:5px 10px;background:#f0f0f0;margin:16px 0 8px;border-left:4px solid #333}
.pd-sec{border:1px solid #ccc;border-left:3px solid #555;border-radius:4px;padding:10px 12px;margin-bottom:8px;page-break-inside:avoid}
.pd-title{font-weight:bold;font-size:13px;margin-bottom:5px}
.pd-rep{font-size:13px;color:#333;margin:2px 0}
.pd-label{font-size:11px;color:#777;margin:3px 0}
.pd-ital{font-style:italic;font-size:13px;color:#444;margin:4px 0}
.pd-msg{background:#fffbe6;border:1px solid #ddd;border-left:4px solid #e6a817;padding:12px;font-style:italic}
.pd-footer{text-align:center;color:#aaa;font-size:11px;margin-top:20px;padding-top:10px;border-top:1px solid #eee}
</style>
</head>

function setState(patch) {
for (var k in patch) state[k] = patch[k];
render();
}

var recognition = null;
var recBase = “”;
var recActive = false;

function toggleSpeech(textareaId, color) {
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) return;
var ta = document.getElementById(textareaId);
if (!ta) return;

if (recActive && recognition) {
recognition.stop();
return;
}

recognition = new SR();
recognition.lang = “fr-FR”;
recognition.continuous = true;
recognition.interimResults = true;
recBase = ta.value || “”;

recognition.onstart = function() {
recActive = true;
updateMicBtn(color);
};
recognition.onend = function() {
recActive = false;
updateMicBtn(null);
};
recognition.onerror = function() {
recActive = false;
updateMicBtn(null);
};
recognition.onresult = function(e) {
var fin = “”, tmp = “”;
for (var i = e.resultIndex; i < e.results.length; i++) {
var t = e.results[i][0].transcript;
if (e.results[i].isFinal) fin += t + “ “;
else tmp += t;
}
if (fin) recBase = (recBase + “ “ + fin).trim();
var full = (recBase + (tmp ? “ “ + tmp : “”)).trim();
ta.value = full;
state.courant = full;
};
try { recognition.start(); } catch(e) {}
}

function updateMicBtn(color) {
var btn = document.getElementById(“mic-btn”);
var hint = document.getElementById(“mic-hint”);
if (!btn) return;
if (color) {
btn.style.background = color;
btn.style.color = “#040c18”;
btn.innerHTML = “■”;
if (hint) hint.style.display = “flex”;
} else {
btn.style.background = “#1a2a3a”;
btn.style.color = “#4a6080”;
btn.innerHTML = micSVG();
if (hint) hint.style.display = “none”;
}
}

function micSVG() {
return ‘<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>’;
}

function esc(s) {
return String(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);
}

function pyrSVG(size) {
var h = Math.round((size||40)*0.85);
return ‘<svg width="' + (size||40) + '" height="' + h + '" viewBox="0 0 40 34" fill="none" style="display:block;margin:0 auto 10px"><polygon points="20,2 38,32 2,32" fill="none" stroke="#60a5fa" stroke-width="1.6" stroke-linejoin="round"/><line x1="3" y1="25" x2="37" y2="25" stroke="#4ade80" stroke-width="1.1" opacity=".7"/><line x1="7" y1="18" x2="33" y2="18" stroke="#fb923c" stroke-width="1.1" opacity=".7"/><line x1="12" y1="11" x2="28" y2="11" stroke="#f87171" stroke-width="1.1" opacity=".7"/></svg>’;
}

function logoImg(h) {
return ‘<img src="data:image/png;base64,' + LOGO_B64 + '" style="height:' + (h||36) + 'px;opacity:.9;display:block;margin:0 auto 8px" alt="A4P Mental"/>’;

function miniPyr(idx) {
var html = ‘<div class="mini-pyr">’;
for (var i = 0; i < NIVEAUX.length; i++) {
var bg = i === idx ? NIVEAUX[i].c : i < idx ? NIVEAUX[i].c + “88” : “#0f1e30”;
html += ‘<div class="mini-seg" style="background:' + bg + '"></div>’;
}
return html + “</div>”;
}

function voixInput(id, value, placeholder, color, minH) {
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var hasSR = !!SR;
var pr = hasSR ? “48px” : “14px”;
return ‘<div class="input-wrap"><textarea id="' + id + '" placeholder="' + esc(placeholder) + '" style="min-height:' + (minH||100) + 'px;padding-right:' + pr + '">’ + esc(value) + ‘</textarea>’ +
(hasSR ? ‘<button class="mic-btn" id="mic-btn" onclick="toggleSpeech(\'+ id +\',\'' + color + '\')">’ + micSVG() + ‘</button><div class="mic-hint" id="mic-hint" style="display:none;color:' + color + '"><span class="mic-dot" style="background:' + color + '"></span>écoute…</div>’ : “”) +
‘</div>’;
}

function secBox(color, title, content) {
return ‘<div class="sec-box" style="border-left:3px solid ' + color + '"><div class="sec-title" style="color:' + color + '">’ + title + ‘</div>’ + content + ‘</div>’;

function has(t, ws) { return ws.some(function(w){ return t.indexOf(w) >= 0; }); }

intervention:“Identité → Sens”,

}

if (blocages.length === 0) {

tensions.push(“Tension entre Sens (vouloir contribuer) et Croyances (se sentir illégitime). Votre Pourquoi est fort mais vos croyances vous empêchent d’y accéder pleinement.”);

function pyrNext() {
var ta = document.getElementById(“main-input”);
var v = ta ? ta.value.trim() : “”;
if (!v) return;
var reps = JSON.parse(JSON.stringify(state.reponses));
var nid = NIVEAUX[state.iNiveau].id;
if (!reps[nid]) reps[nid] = {};
reps[nid][state.iQuestion] = v;
var niv = NIVEAUX[state.iNiveau];
if (state.iQuestion+1 < niv.qs.length) {
setState({reponses:reps, iQuestion:state.iQuestion+1, courant:””});
} else if (state.iNiveau+1 < NIVEAUX.length) {
setState({reponses:reps, iNiveau:state.iNiveau+1, iQuestion:0, courant:””});

setState({reponses:reps, page:“loading”, courant:””});

buildPrintDoc(d);
setState({diag:d, page:“diag”});

}
